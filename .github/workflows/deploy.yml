name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Required for keyless auth to GCP via Workload Identity Federation.
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: candletunes
  REGION: us-central1
  SERVICE: candletunes
  IMAGE_REPO: us-central1-docker.pkg.dev/candletunes/candletunes/candletunes

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/114668854768/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: candletunes-deploy@candletunes.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${IMAGE_REPO}:${GITHUB_SHA::7}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --quiet
